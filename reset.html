<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>刷新 OoFR 缓存</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f7f1de;
        color: #151713;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        max-width: 28rem;
        padding: 2rem;
        line-height: 1.7;
      }

      strong {
        display: block;
        margin-bottom: 0.5rem;
        font-size: 1.3rem;
      }
    </style>
  </head>
  <body>
    <main>
      <strong>正在刷新 OoFR 缓存</strong>
      <p>这个页面只更新离线缓存，不会删除你的专辑、磁带、段落和单词本。</p>
    </main>
    <script>
      (async function resetOoFRCache() {
        try {
          if ("serviceWorker" in navigator) {
            const registrations = await navigator.serviceWorker.getRegistrations();
            await Promise.all(registrations.map((registration) => registration.unregister()));
          }

          if ("caches" in window) {
            const keys = await caches.keys();
            await Promise.all(keys.map((key) => caches.delete(key)));
          }
        } catch (error) {
          console.warn("OoFR cache reset skipped:", error);
        } finally {
          window.location.replace(`./?fresh=${Date.now()}`);
        }
      }());
    </script>
  </body>
</html>
